services:
  - type: web
    name: fatigue-detector
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y cmake libopenblas-dev liblapack-dev libx11-dev libgtk-3-dev libboost-python-dev
      pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "*"